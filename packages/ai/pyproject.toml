[project]
name = "bloom-ai"
version = "0.1.0"
description = "Shared AI dependencies for Bloom"
requires-python = ">=3.12"
dependencies = [
    "langchain",
    "langgraph",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bloom_ai"]
